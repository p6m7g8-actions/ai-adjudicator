name: auto-approve

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_run:
    workflows: ["Build", "Claude Code Review", "Codex Code Review"]
    types: [completed]

jobs:
  adjudicate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: AI adjudicator
        uses: p6m7g8-actions/ai-adjudicator@main
        with:
          gh_token: ${{ secrets.P6_A_GH_TOKEN }}
